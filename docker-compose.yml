services:
  qdrant:
    image: qdrant/qdrant:latest
    expose:
      - "6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      QDRANT_URL: http://qdrant:6333
      METADATA_CSV_PATH: /data/talks.csv
      TRANSCRIPTS_DIR: /data/transcripts
    volumes:
      - ./talks.csv:/data/talks.csv:ro
      - ./transcripts:/data/transcripts:ro
    depends_on:
      - qdrant
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  qdrant_data:
