services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend

  frontend:
    build: ./frontend
    environment:
      HOST: "0.0.0.0"
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env
    environment:
      QDRANT_URL: http://qdrant:6333
      DATABASE_URL: postgresql+psycopg://pariyesana:${PG_PASSWORD}@postgres:5432/pariyesana
      TRANSCRIPTS_DIR: /data/transcripts
    volumes:
      - ./transcripts:/data/transcripts:ro
      - hf_cache:/root/.cache/huggingface
    depends_on:
      - postgres
      - qdrant
    restart: unless-stopped

  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: pariyesana
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: pariyesana
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  qdrant_data:
  hf_cache:
