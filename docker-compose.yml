services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: pariyesana
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: pariyesana
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    expose:
      - "6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      QDRANT_URL: http://qdrant:6333
      DATABASE_URL: postgresql+psycopg://pariyesana:${PG_PASSWORD}@postgres:5432/pariyesana
      TRANSCRIPTS_DIR: /data/transcripts
    volumes:
      - ./transcripts:/data/transcripts:ro
    depends_on:
      - postgres
      - qdrant
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      HOST: "0.0.0.0"
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
  qdrant_data:
